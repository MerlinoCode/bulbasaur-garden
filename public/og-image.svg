<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="emeraldGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#0ea5e9" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.95"/>
    </radialGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <ellipse cx="600" cy="315" rx="420" ry="220" fill="url(#emeraldGlow)" filter="url(#blur)"/>
  
  <!-- Subtle Bulbasaur leaf watermark -->
  <g opacity="0.10" transform="translate(900,180) scale(2.2)">
    <path d="M24 8C18 8 12 14 12 22c0 8 6 14 12 14s12-6 12-14c0-8-6-14-12-14zm0 2c5.5 0 10 5.1 10 12 0 6.9-4.5 12-10 12S14 28.9 14 22c0-6.9 4.5-12 10-12z" fill="#10b981"/>
  </g>
  
  <!-- Main title -->
  <text x="50%" y="48%" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="900" fill="url(#textGradient)" letter-spacing="2" dominant-baseline="middle">
    JARDÍN BULBASAUR
  </text>
  
  <!-- Subtitle -->
  <text x="50%" y="60%" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" fill="#a1a1a1" font-weight="500" letter-spacing="1" dominant-baseline="middle">
    Tu puerta al mundo Pokémon
  </text>
</svg>